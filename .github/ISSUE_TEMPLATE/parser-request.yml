name: New bank parser request
description: A Nigerian bank that bankstract doesn't yet support
title: "[parser] <bank>: support request"
labels: ["enhancement", "new-parser"]
body:
  - type: markdown
    attributes:
      value: |
        ## Adding a bank takes a sample

        We can't write a parser without seeing the format. Read
        `CONTRIBUTING.md` for the full workflow. Short version:

        1. Run `bankstract redact <existing-bank-with-similar-format> raw.pdf
           redacted.pdf` — OR redact manually if no equivalent parser exists.
        2. Verify no PII remains.
        3. Attach the redacted sample below.

        Owner will scope it against the roadmap (currently GTB PDF next,
        then XLSX batch for Kuda / Stanbic / Sparkle / ALAT).

  - type: input
    id: bank
    attributes:
      label: Bank name
      placeholder: GTBank, Kuda, Stanbic, etc.
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Format the bank ships
      options:
        - PDF only
        - XLSX only
        - both
        - unsure
    validations:
      required: true

  - type: dropdown
    id: export_path
    attributes:
      label: How users get their statement
      options:
        - In-app download
        - Email attachment
        - Web portal download
        - SMS / WhatsApp share
        - Other
    validations:
      required: true

  - type: textarea
    id: sample_notes
    attributes:
      label: Notes about the statement layout
      description: What columns are present? Running balance? Multi-page? Anything unusual.

  - type: checkboxes
    id: privacy
    attributes:
      label: Redaction confirmation
      options:
        - label: I verified no real names, account numbers, or counterparty info remain in the attached sample
          required: true

  - type: textarea
    id: attachment
    attributes:
      label: Redacted sample (drag-and-drop or paste)
      description: REDACTED PDF or XLSX. Required for any parser work to begin.
    validations:
      required: false
