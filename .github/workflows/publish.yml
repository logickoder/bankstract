name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC trusted publishing — configure once at
# https://pypi.org/manage/project/bankstract/settings/publishing/
# with workflow=publish.yml, owner=logickoder, repo=bankstract.
permissions:
  id-token: write
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install poppler
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@main
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Lint + types + tests
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run pyright src tests
          uv run pytest

      # Release gate. Two filters; if either says skip, publish is skipped.
      #
      #   1. PATH filter: skip if no release-relevant file changed (anything
      #      outside src/, pyproject.toml, uv.lock — docs-only / tests-only
      #      / CI-only commits don't get published).
      #   2. COMMIT TYPE filter (Conventional Commits):
      #        feat        → minor bump on collision
      #        fix / perf  → patch bump on collision
      #        chore / docs / test / refactor / ci / style / build / revert → skip
      #        anything else → fail loud (forces explicit type)
      #
      # workflow_dispatch bypasses both filters so manual runs always publish.
      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_paths_touched=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff-tree --no-commit-id --name-only -r HEAD)
          echo "Changed files in HEAD:"
          echo "$files" | sed 's/^/  /'

          touched=false
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            case "$f" in
              src/*|pyproject.toml|uv.lock) touched=true; break ;;
            esac
          done <<< "$files"
          echo "release_paths_touched=$touched" >> "$GITHUB_OUTPUT"

      - name: Determine release decision
        id: ct
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=manual" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — bypassing path + commit-type filters."
            exit 0
          fi

          if [[ "${{ steps.changes.outputs.release_paths_touched }}" != "true" ]]; then
            echo "type=none" >> "$GITHUB_OUTPUT"
            echo "No release-relevant paths touched (src/, pyproject.toml, uv.lock). Skipping publish."
            exit 0
          fi

          subject=$(git log -1 --pretty=%s)
          echo "Commit subject: $subject"

          prefix="${subject%%[:(]*}"
          case "$prefix" in
            feat)
              echo "type=minor" >> "$GITHUB_OUTPUT" ;;
            fix|perf)
              echo "type=patch" >> "$GITHUB_OUTPUT" ;;
            chore|docs|test|refactor|ci|style|build|revert)
              echo "type=none" >> "$GITHUB_OUTPUT"
              echo "Non-release commit type '$prefix' — will skip publish." ;;
            *)
              # Unknown / non-Conventional subject. Don't fail the workflow —
              # just skip publish. Forces the next release-bearing commit
              # (feat / fix / perf) to opt back in explicitly.
              echo "type=none" >> "$GITHUB_OUTPUT"
              echo "::warning::Non-Conventional commit subject '$subject' — skipping publish. Use feat|fix|perf prefix to release." ;;
          esac

      - name: Resolve publish version
        id: version
        if: steps.ct.outputs.type != 'none'
        shell: bash
        run: |
          set -euo pipefail

          NAME=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['name'])")
          VERSION=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")

          echo "package_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "initial_version=$VERSION" >> "$GITHUB_OUTPUT"

          if curl -fs "https://pypi.org/pypi/${NAME}/${VERSION}/json" > /dev/null 2>&1; then
            bump="${{ steps.ct.outputs.type }}"
            if [[ "$bump" == "manual" ]]; then
              echo "::error::Manual dispatch but version ${VERSION} already on PyPI. Bump locally first, then retry."
              exit 1
            fi
            echo "Version ${VERSION} already on PyPI. Bumping ${bump}..."
            scripts/bump-version.sh "$bump"
            NEW_VERSION=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml src/bankstract/__init__.py uv.lock README.md
            git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"
            git push origin HEAD:main

            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build wheel + sdist
        if: steps.ct.outputs.type != 'none'
        run: uv build

      - name: Publish to PyPI
        if: steps.ct.outputs.type != 'none'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Summary
        if: always()
        run: |
          if [[ "${{ steps.ct.outputs.type }}" == "none" ]]; then
            echo "Publish skipped (paths_touched=${{ steps.changes.outputs.release_paths_touched }}, decision=none)."
          else
            echo "Published ${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.version }}"
            echo "Decision: ${{ steps.ct.outputs.type }} | bumped: ${{ steps.version.outputs.bumped }}"
          fi
